# nexus-agents skill & agent taxonomy — v3
# Tier 1: Domain  |  Tier 2: Category
#
# prefix:      naming prefix for any skill/agent/prompt in that category
#              e.g. Marketing > Market Intelligence → "marketing-intel-{name}"
# description: user-facing "I want to..." statement to aid discovery
#
# Revision notes (v3):
#   - tech renamed to engineering throughout (aligns with Anthropic Cowork plugin naming)
#   - devops split out from engineering as standalone top-level domain
#   - strategy split: market/research intelligence moved to research domain
#   - comms collapsed into people domain
#   - knowledge formalized as standalone domain
#   - ai: practitioner layer (prompts, ML, RAG, AI product work)
#   - agents: new top-level domain for meta-layer (skills, personas, plugins, specs)
#   - agent-* and prompt-* stray prefixes absorbed into agents/ai respectively
#   - legal restored as standalone top-level domain
#   - finance split into finance (operational) and financial-analysis (analytical)
#   - ops cleaned to core process/operations scope
#   - personal-* absorbed into productivity
#   - frontend-design-impactful reclassified to design-web-impactful

domains:

  - name: Marketing
    prefix: marketing
    description: Promote, launch, or grow a product or brand
    categories:
      - name: Content & Copywriting
        prefix: marketing-content
        description: Write ads, emails, social posts, and campaign copy
      - name: Brand & Identity
        prefix: marketing-brand
        description: Define or refine brand voice, positioning, and visual identity
      - name: Campaign & Growth
        prefix: marketing-campaign
        description: Plan go-to-market strategies, launches, and growth programs
      - name: SEO & Performance
        prefix: marketing-seo
        description: Improve search visibility and measure marketing performance
      - name: Market Intelligence
        prefix: marketing-intel
        description: Research audiences, segments, and market opportunities

  - name: Sales
    prefix: sales
    description: Find, engage, and close customers
    categories:
      - name: Prospecting & Outreach
        prefix: sales-outreach
        description: Identify leads and craft outreach messages
      - name: Pipeline & Forecasting
        prefix: sales-pipeline
        description: Review deals, update forecasts, and manage pipeline health
      - name: Call Management
        prefix: sales-call
        description: Prepare for calls, capture summaries, and follow up
      - name: Competitive Intelligence
        prefix: sales-intel
        description: Build battlecards and understand the competitive landscape
      - name: Customer Success
        prefix: sales-cs
        description: Onboard, retain, and expand existing customer relationships

  - name: Content & Writing
    prefix: content
    description: Create, edit, or refine written content for any audience or format
    categories:
      - name: Copywriting & Editing
        prefix: content-copy
        description: Write and polish persuasive or informational copy
      - name: Technical Writing
        prefix: content-technical
        description: Document systems, APIs, processes, or products
      - name: Storytelling & Narrative
        prefix: content-story
        description: Craft compelling narratives, case studies, or long-form content
      - name: Visual & Creative
        prefix: content-visual
        description: Generate concepts, scripts, or briefs for visual content
      - name: Behavioral & Persuasion
        prefix: content-behavioral
        description: Apply behavioral science and persuasion frameworks to content
      - name: Style & Voice
        prefix: content-style
        description: Extract, define, or apply a consistent writing style or voice

  - name: Design
    prefix: design
    description: Design user experiences, interfaces, or visual assets
    categories:
      - name: UX Research
        prefix: design-research
        description: Synthesize user research and identify design insights
      - name: Visual Design
        prefix: design-visual
        description: Define visual systems, components, and design guidelines
      - name: Design Delivery
        prefix: design-delivery
        description: Prepare handoffs, specs, and accessibility reviews
      - name: UX Writing
        prefix: design-copy
        description: Write interface copy, microcopy, and onboarding flows
      - name: Application & Product Design
        prefix: design-app
        description: Design application flows, sitemaps, and product UI patterns
      - name: Frontend & Web Design
        prefix: design-web
        description: Build and style high-impact web pages and marketing surfaces

  - name: Engineering
    prefix: engineering
    description: Build, ship, and maintain software systems
    categories:
      - name: Architecture & System Design
        prefix: engineering-arch
        description: Design system architecture, APIs, and infrastructure topology
      - name: Software Development
        prefix: engineering-dev
        description: Write, review, and refactor code in any language or framework
      - name: Code Quality & Testing
        prefix: engineering-quality
        description: Review code, write tests, and reduce technical debt
      - name: APIs & Integrations
        prefix: engineering-api
        description: Design and build APIs, integrations, and MCP connections
      - name: Documentation
        prefix: engineering-doc
        description: Write technical documentation, runbooks, and reference guides
      - name: Repositories & Workflow
        prefix: engineering-github
        description: Manage repositories, branching strategy, and GitHub operations

  - name: DevOps
    prefix: devops
    description: Ship, run, and secure production systems
    categories:
      - name: Infrastructure & Platforms
        prefix: devops-infra
        description: Manage cloud infrastructure, pipelines, and platform reliability
      - name: Security
        prefix: devops-security
        description: Review systems and code for vulnerabilities and compliance
      - name: Incident Response
        prefix: devops-incident
        description: Triage, resolve, and document production incidents
      - name: Deployment & Release
        prefix: devops-deploy
        description: Manage deployment workflows, releases, and rollbacks

  - name: Data & Analytics
    prefix: data
    description: Analyze data, generate insights, and build reports or dashboards
    categories:
      - name: Data Analysis
        prefix: data-analysis
        description: Explore, query, and interpret datasets to answer business questions
      - name: Data Visualization
        prefix: data-visual
        description: Build charts, dashboards, and visual reports
      - name: Data Engineering
        prefix: data-eng
        description: Build pipelines, schemas, and data infrastructure
      - name: AI & ML
        prefix: data-ai
        description: Design and build machine learning models and AI pipelines

  - name: AI
    prefix: ai
    description: Work with AI systems — prompts, models, RAG, and AI product development
    categories:
      - name: Prompt Engineering
        prefix: ai-prompt
        description: Write, optimize, and evaluate prompts for any model or use case
      - name: AI Product
        prefix: ai-product
        description: Design and build AI-powered products and features
      - name: RAG & Retrieval
        prefix: ai-rag
        description: Design and implement retrieval-augmented generation systems
      - name: Model Development
        prefix: ai-model
        description: Train, fine-tune, and evaluate machine learning models
      - name: AI Research
        prefix: ai-research
        description: Track frontier AI developments and synthesize research

  - name: Agents
    prefix: agents
    description: Build, design, and manage AI agents and skills
    categories:
      - name: Skill Building
        prefix: agents-skill
        description: Create, spec, and maintain agent skills
      - name: Agent Design
        prefix: agents-design
        description: Design agent personas, capabilities, and interaction patterns
      - name: Copilot & Plugins
        prefix: agents-copilot
        description: Build copilot instructions, plugins, and tool integrations
      - name: Catalog & Governance
        prefix: agents-catalog
        description: Organize, classify, and govern an agent and skill catalog

  - name: Product
    prefix: product
    description: Define, plan, and improve a product
    categories:
      - name: Product Definition
        prefix: product-spec
        description: Write specs, PRDs, and feature requirements
      - name: Strategy & Vision
        prefix: product-strategy
        description: Define product vision, OKRs, and long-term direction
      - name: Discovery
        prefix: product-discovery
        description: Validate ideas, run discovery, and frame product opportunities
      - name: Roadmap & Planning
        prefix: product-roadmap
        description: Build roadmaps, prioritize features, and plan sprints
      - name: Stakeholder Management
        prefix: product-stakeholder
        description: Communicate product decisions and updates to stakeholders

  - name: Strategy & Business
    prefix: strategy
    description: Make better decisions and plan for business growth
    categories:
      - name: Decision Making
        prefix: strategy-decision
        description: Structure, interrogate, and document complex decisions
      - name: Business Planning
        prefix: strategy-planning
        description: Build business plans, models, and investment narratives
      - name: Frameworks & Reasoning
        prefix: strategy-frameworks
        description: Structure and solve complex problems using strategic frameworks
      - name: Change Management
        prefix: strategy-change
        description: Plan and execute organizational change and adoption initiatives
      - name: Thought Leadership
        prefix: strategy-thought
        description: Craft expert perspectives, executive insights, and industry viewpoints
      - name: Innovation
        prefix: strategy-innovation
        description: Generate and stress-test new ideas, opportunities, and ventures
      - name: Technology Strategy
        prefix: strategy-tech
        description: Evaluate technology trends, plan AI adoption, and define technology roadmaps

  - name: Research & Intelligence
    prefix: research
    description: Find, synthesize, and act on information about markets, industries, and competitors
    categories:
      - name: Market & Competitive Research
        prefix: research-market
        description: Research competitors, markets, and strategic opportunities
      - name: Industry Intelligence
        prefix: research-intel
        description: Track developments, trends, and signals across industries
      - name: Document & Deep Reading
        prefix: research-docs
        description: Extract insights from documents, reports, and long-form content
      - name: General Research
        prefix: research-general
        description: Research any topic using external sources and synthesis

  - name: Knowledge
    prefix: knowledge
    description: Capture, organize, and retrieve information across tools and projects
    categories:
      - name: Knowledge Operations
        prefix: knowledge-ops
        description: Build and maintain knowledge bases, wikis, and information systems
      - name: Context & Memory
        prefix: knowledge-context
        description: Capture and curate context, memory, and working knowledge for AI systems
      - name: Document Intelligence
        prefix: knowledge-docs
        description: Extract, structure, and make documents searchable and useful

  - name: Project Management
    prefix: project
    description: Plan, track, and deliver projects on time
    categories:
      - name: Project Planning
        prefix: project-planning
        description: Scope projects, define milestones, and allocate resources
      - name: Execution & Tracking
        prefix: project-tracking
        description: Track progress, manage blockers, and keep work moving
      - name: Agile & Sprints
        prefix: project-agile
        description: Run standups, retrospectives, sprint planning, and ceremonies
      - name: Reporting & Escalation
        prefix: project-reporting
        description: Write status updates and escalate risks or issues

  - name: People & Talent
    prefix: people
    description: Hire, develop, communicate with, and manage people and teams
    categories:
      - name: Recruiting & Hiring
        prefix: people-recruiting
        description: Source candidates, write job descriptions, and manage pipelines
      - name: Onboarding
        prefix: people-onboarding
        description: Design onboarding programs and first-day experiences
      - name: Performance Management
        prefix: people-performance
        description: Run reviews, set goals, and give structured feedback
      - name: Org Planning
        prefix: people-org
        description: Plan org structure, headcount, and reporting lines
      - name: Internal Communications
        prefix: people-comms
        description: Write announcements, executive memos, all-hands content, and leadership messaging
      - name: Policy & Culture
        prefix: people-culture
        description: Write policies, handbooks, and culture-building programs
      - name: Learning & Development
        prefix: people-learning
        description: Design training programs, curricula, and skill development plans

  - name: Operations
    prefix: ops
    description: Improve, document, and scale business processes
    categories:
      - name: Process & Documentation
        prefix: ops-process
        description: Document SOPs, workflows, and operating procedures
      - name: Capacity & Planning
        prefix: ops-capacity
        description: Plan headcount, resources, and operational capacity
      - name: Risk & Compliance
        prefix: ops-risk
        description: Identify, assess, and mitigate operational and regulatory risks
      - name: Vendor Management
        prefix: ops-vendor
        description: Evaluate, onboard, and manage vendor relationships

  - name: Legal
    prefix: legal
    description: Handle contracts, compliance, and legal risk
    categories:
      - name: Contract Management
        prefix: legal-contracts
        description: Draft, review, and negotiate contracts and NDAs
      - name: Compliance & Regulatory
        prefix: legal-compliance
        description: Monitor and assess regulatory and policy compliance requirements
      - name: Risk Assessment
        prefix: legal-risk
        description: Identify and assess legal risk in business decisions
      - name: Legal Communications
        prefix: legal-comms
        description: Draft legal responses, briefs, and correspondence

  - name: Finance
    prefix: finance
    description: Manage financial operations, reporting, and accounting
    categories:
      - name: Reporting & Accounting
        prefix: finance-reporting
        description: Prepare financial reports, statements, and journal entries
      - name: Close Management
        prefix: finance-close
        description: Manage month-end and quarter-end close processes
      - name: Audit & Compliance
        prefix: finance-audit
        description: Support audits and regulatory compliance activities
      - name: Budgeting
        prefix: finance-budget
        description: Build and manage budgets, allocations, and spend tracking

  - name: Financial Analysis
    prefix: financial-analysis
    description: Analyze financial data, build models, and generate investment-grade insights
    categories:
      - name: Financial Modeling
        prefix: financial-analysis-modeling
        description: Build financial models, forecasts, and scenario plans
      - name: Performance Analysis
        prefix: financial-analysis-performance
        description: Analyze variances, trends, and business unit performance
      - name: Market & Investment Research
        prefix: financial-analysis-market
        description: Research markets, sectors, and investment opportunities
      - name: Presentations & Narratives
        prefix: financial-analysis-narrative
        description: Build investor-ready presentations, memos, and financial narratives

  - name: Productivity
    prefix: productivity
    description: Manage tasks, communication style, time, and daily workflows more effectively
    categories:
      - name: Task & Work Management
        prefix: productivity-tasks
        description: Organize, prioritize, and track personal or team tasks
      - name: Meetings & Collaboration
        prefix: productivity-meetings
        description: Capture notes, summarize discussions, and track decisions and action items
      - name: Personal Effectiveness
        prefix: productivity-personal
        description: Develop communication style, habits, and personal working patterns
      - name: Daily Operations
        prefix: productivity-daily
        description: Prepare daily briefings, manage schedules, and run standups
      - name: Creativity & Ideation
        prefix: productivity-ideas
        description: Brainstorm options, generate concepts, and explore directions before deciding
      - name: Memory & Context
        prefix: productivity-memory
        description: Capture, store, and retrieve personal and project context