<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:v="urn:schemas-microsoft-com:vml"
      xmlns:o="urn:schemas-microsoft-com:office:office"
      lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if gte mso 9]>
  <xml><o:OfficeDocumentSettings>
    <o:AllowPNG/>
    <o:PixelsPerInch>96</o:PixelsPerInch>
  </o:OfficeDocumentSettings></xml>
  <![endif]-->
  <title>{{subject}}</title>
  <style type="text/css">
    /* === DESIGN TOKENS — replace with brand values === */
    /* --color-bg-body: #f4f4f5 */
    /* --color-bg-content: #ffffff */
    /* --color-brand-primary: #4f46e5 */
    /* --color-text-primary: #111827 */
    /* --color-text-secondary: #6b7280 */
    /* --color-text-link: #4f46e5 */
    /* --color-border: #e5e7eb */
    /* --color-button-bg: #4f46e5 */
    /* --color-button-text: #ffffff */
    /* --font-family: 'Inter', Arial, Helvetica, sans-serif */
    /* --spacing-content-width: 600px */

    /* Resets */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    table { border-collapse: collapse !important; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }

    /* iOS blue link override */
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; }
    /* Gmail blue link override */
    u + #body a { color: inherit; text-decoration: none; font-size: inherit; font-family: inherit; font-weight: inherit; line-height: inherit; }

    /* Responsive */
    @media screen and (max-width: 600px) {
      .email-container { width: 100% !important; }
      .mobile-full { width: 100% !important; display: block !important; }
      .mobile-padding { padding: 20px 16px !important; }
      .mobile-text { font-size: 18px !important; line-height: 1.6 !important; }
      .mobile-h1 { font-size: 24px !important; line-height: 1.3 !important; }
      .mobile-hide { display: none !important; max-height: 0 !important; overflow: hidden !important; }
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background-color: #111827 !important; }
      .body-bg { background-color: #111827 !important; }
      .content-bg { background-color: #1f2937 !important; }
      .text-primary { color: #f9fafb !important; }
      .text-secondary { color: #9ca3af !important; }
      .border-color { border-color: #374151 !important; }
      .logo-light { display: none !important; }
      .logo-dark { display: inline-block !important; }
    }
  </style>
</head>
<body id="body" style="margin: 0; padding: 0; background-color: #f4f4f5;">

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
         class="body-bg" style="background-color: #f4f4f5;">
    <tr>
      <td align="center" style="padding: 24px 0;">

        <!-- Email container: 600px wide -->
        <table role="presentation" class="email-container" cellspacing="0" cellpadding="0" border="0"
               width="600" style="max-width: 600px; background-color: #ffffff;" align="center">

          <!-- ============================
               HEADER
          ============================= -->
          <tr>
            <td class="content-bg mobile-padding"
                style="padding: 24px 32px; background-color: #ffffff; border-bottom: 1px solid #e5e7eb; text-align: center;">
              <!-- Logo: swap src, width, and alt -->
              <!--[if !mso]><!-->
              <img src="{{logo_url}}" width="140" height="auto" alt="{{company_name}}"
                   class="logo-light"
                   style="display: inline-block; max-width: 140px; height: auto;">
              <!-- Dark mode logo (hidden by default) -->
              <img src="{{logo_url_dark}}" width="140" height="auto" alt="{{company_name}}"
                   class="logo-dark"
                   style="display: none; max-width: 140px; height: auto;">
              <!--<![endif]-->
              <!--[if mso]>
              <img src="{{logo_url}}" width="140" alt="{{company_name}}" style="display:block;">
              <![endif]-->
            </td>
          </tr>

          <!-- ============================
               HERO / BANNER
          ============================= -->
          <tr>
            <td class="content-bg mobile-padding"
                style="padding: 40px 32px 32px; background-color: #ffffff; text-align: center;">
              <h1 class="text-primary mobile-h1"
                  style="margin: 0 0 12px 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                         font-size: 28px; font-weight: 700; line-height: 1.3; color: #111827;">
                {{headline}}
              </h1>
              <p class="text-secondary mobile-text"
                 style="margin: 0 0 24px 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                        font-size: 16px; line-height: 1.6; color: #6b7280;">
                {{subheadline}}
              </p>

              <!-- CTA Button -->
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
                xmlns:w="urn:schemas-microsoft-com:office:word"
                href="{{action_url}}"
                style="height:48px; v-text-anchor:middle; width:200px;"
                arcsize="8%" strokecolor="#4f46e5" fillcolor="#4f46e5">
                <w:anchorlock/>
                <center style="color:#ffffff; font-family:Arial,sans-serif; font-size:16px; font-weight:bold;">
                  {{button_text}}
                </center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{action_url}}"
                 style="display: inline-block; background-color: #4f46e5; color: #ffffff;
                        font-family: 'Inter', Arial, Helvetica, sans-serif; font-size: 16px;
                        font-weight: 600; line-height: 48px; padding: 0 28px;
                        text-decoration: none; border-radius: 6px; -webkit-text-size-adjust: none;">
                {{button_text}}
              </a>
              <!--<![endif]-->
            </td>
          </tr>

          <!-- ============================
               BODY CONTENT BLOCK
          ============================= -->
          <tr>
            <td class="content-bg mobile-padding"
                style="padding: 32px; background-color: #ffffff; border-top: 1px solid #e5e7eb;">
              <p class="text-primary mobile-text"
                 style="margin: 0 0 16px 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                        font-size: 16px; line-height: 1.6; color: #111827;">
                {{body_paragraph_1}}
              </p>
              <p class="text-primary mobile-text"
                 style="margin: 0 0 16px 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                        font-size: 16px; line-height: 1.6; color: #111827;">
                {{body_paragraph_2}}
              </p>
            </td>
          </tr>

          <!-- ============================
               DIVIDER
          ============================= -->
          <tr>
            <td style="padding: 0 32px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td class="border-color"
                      style="border-top: 1px solid #e5e7eb; font-size: 0; line-height: 0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ============================
               FOOTER
          ============================= -->
          <tr>
            <td class="content-bg mobile-padding"
                style="padding: 24px 32px; background-color: #ffffff; text-align: center;">
              <p class="text-secondary"
                 style="margin: 0 0 8px 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                        font-size: 13px; line-height: 1.5; color: #6b7280;">
                {{company_name}} · {{company_address}}
              </p>
              <p style="margin: 0; font-family: 'Inter', Arial, Helvetica, sans-serif;
                        font-size: 13px; line-height: 1.5; color: #9ca3af;">
                You received this because you signed up for {{company_name}}.
                <a href="{{unsubscribe_url}}"
                   style="color: #9ca3af; text-decoration: underline;">Unsubscribe</a>
              </p>
            </td>
          </tr>

        </table>
        <!-- End email container -->

      </td>
    </tr>
  </table>
  <!-- End outer wrapper -->

</body>
</html>
